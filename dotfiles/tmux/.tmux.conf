# ==============================
# Plugin declarations (TPM)
# ==============================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'catppuccin/tmux'

# ==============================
# Core behavior and terminal
# ==============================
set-option -sa terminal-overrides ",xterm*:Tc"
set -g mouse on
set -g repeat-time 700
set -g status-position top
set-environment -g EDITOR nvim
set-environment -g VISUAL nvim
set-environment -g K9S_EDITOR nvim

# Prefix key: Ctrl+Space instead of Ctrl+b
set -g prefix C-Space
unbind C-b
bind C-Space send-prefix

# Reload configuration quickly with Prefix + r
unbind r
bind r source-file ~/.tmux.conf

# ==============================
# Window and pane defaults
# ==============================
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on
set-window-option -g mode-keys vi

# ==============================
# Navigation and split bindings
# ==============================
unbind h
unbind l
unbind b

bind-key -r h previous-window
bind-key -r l next-window
bind-key Tab last-window

bind j split-window -v
bind L split-window -h

# Smart maximize/restore helper on Prefix + m:
# - If only one pane exists, split and focus the new lower pane
# - Otherwise toggle zoom and keep focus movement intuitive
bind-key m run-shell 'panes=$(tmux display-message -p "#{window_panes}"); if [ "$panes" -eq 1 ]; then tmux split-window -v -p 30; tmux select-pane -D 2>/dev/null || true; exit 0; fi; zoomed=$(tmux display-message -p "#{window_zoomed_flag}"); top=$(tmux display-message -p "#{pane_at_top}"); if [ "$zoomed" = "1" ]; then tmux resize-pane -Z; tmux select-pane -D 2>/dev/null || true; elif [ "$top" = "1" ]; then tmux resize-pane -Z; else tmux select-pane -U 2>/dev/null || true; tmux resize-pane -Z; fi'

# ==============================
# Copy mode (vi-style)
# ==============================
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# ==============================
# Session picker (sesh + fzf-tmux)
# ==============================
# Prefix + T and Prefix + Space intentionally open the same picker.
bind-key "T" run-shell "sesh connect \"$(
	sesh list | fzf-tmux -p 55%,60% \
		--no-sort --ansi --border-label ' sesh ' --prompt '⚡  ' \
		--header '  ^a all ^t tmux ^g configs ^x zoxide ^d tmux kill ^f find' \
		--bind 'tab:down,btab:up' \
		--bind 'ctrl-a:change-prompt(⚡  )+reload(sesh list)' \
		--bind 'ctrl-t:change-prompt(🪟  )+reload(sesh list -t)' \
		--bind 'ctrl-g:change-prompt(⚙️  )+reload(sesh list -c)' \
		--bind 'ctrl-x:change-prompt(📁  )+reload(sesh list -z)' \
		--bind 'ctrl-f:change-prompt(🔎  )+reload(fd -H -d 2 -t d -E .Trash . ~)' \
		--bind 'ctrl-d:execute(tmux kill-session -t {})+change-prompt(⚡  )+reload(sesh list)'
)\""

bind-key Space run-shell "sesh connect \"$(
	sesh list | fzf-tmux -p 55%,60% \
		--no-sort --ansi --border-label ' sesh ' --prompt '⚡  ' \
		--header '  ^a all ^t tmux ^g configs ^x zoxide ^d tmux kill ^f find' \
		--bind 'tab:down,btab:up' \
		--bind 'ctrl-a:change-prompt(⚡  )+reload(sesh list)' \
		--bind 'ctrl-t:change-prompt(🪟  )+reload(sesh list -t)' \
		--bind 'ctrl-g:change-prompt(⚙️  )+reload(sesh list -c)' \
		--bind 'ctrl-x:change-prompt(📁  )+reload(sesh list -z)' \
		--bind 'ctrl-f:change-prompt(🔎  )+reload(fd -H -d 2 -t d -E .Trash . ~)' \
		--bind 'ctrl-d:execute(tmux kill-session -t {})+change-prompt(⚡  )+reload(sesh list)'
)\""

# ==============================
# Kubernetes helpers (fzf-tmux)
# ==============================
bind-key "K" run-shell "current=\$(kubectl config current-context); \
                selected_context=\$(kubectl config get-contexts -o name | \
                awk -v current=\"\$current\" '{print (current == \$0) ? \"✓ \" \$0 : \"  \" \$0}' | \
                fzf-tmux -p 55%,60% \
                --no-sort --ansi --border-label ' k8s context ' --prompt '⚡  ' \
                --header '  ^a all ^c current ^d delete' \
                --bind 'tab:down,btab:up' \
                --bind 'ctrl-a:change-prompt(⚡  )+reload(kubectl config get-contexts -o name | awk -v current=\"\$current\" \"{print (current == \\\$0) ? \\\"✓ \\\" \\\$0 : \\\"  \\\" \\\$0}\")' \
                --bind 'ctrl-c:change-prompt(🌎  )+reload(echo \"✓ \$current\")' \
                --bind 'ctrl-d:execute(kubectl config delete-context {2..})+change-prompt(⚡  )+reload(kubectl config get-contexts -o name | awk -v current=\"\$current\" \"{print (current == \\\$0) ? \\\"✓ \\\" \\\$0 : \\\"  \\\" \\\$0}\")' \
                | sed -e 's/^✓ //; s/^  //' ); \
                if [ -n \"\$selected_context\" ]; then kubectl config use-context \"\$selected_context\"; fi"

bind-key "N" run-shell "current_ns=\$(kubectl config view --minify --output 'jsonpath={..namespace}'); \
                [ -z \"\$current_ns\" ] && current_ns=\"default\"; \
                selected_ns=\$(kubectl get namespaces -o name | sed 's/^namespace\\///' | \
                awk -v current=\"\$current_ns\" '{print (current == \$0) ? \"✓ \" \$0 : \"  \" \$0}' | \
                fzf-tmux -p 55%,60% \
                --no-sort --ansi --border-label ' k8s namespace ' --prompt '🔍  ' \
                --header '  ^a all ^c current' \
                --bind 'tab:down,btab:up' \
                --bind 'ctrl-a:change-prompt(🔍  )+reload(kubectl get namespaces -o name | sed \"s/^namespace\\//\" | awk -v current=\"\$current_ns\" \"{print (current == \\\$0) ? \\\"✓ \\\" \\\$0 : \\\"  \\\" \\\$0}\")' \
                --bind 'ctrl-c:change-prompt(📌  )+reload(echo \"✓ \$current_ns\")' \
                | sed -e 's/^✓ //; s/^  //' ); \
                if [ -n \"\$selected_ns\" ]; then \
                    kubectl config set-context --current --namespace=\"\$selected_ns\"; \
                    tmux display-message \"Switched to namespace: \$selected_ns\"; \
                fi"

# ==============================
# Catppuccin status line
# ==============================
set -g status 2
set -g 'status-format[1]' '#[bg=#1e1d2c,fg=#cdd6f4]#[fill=#1e1d2c]'
set -g status-justify left
set -g status-left-length 100
set -g status-right-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_application}"
set -ag status-right "#{E:@catppuccin_status_session}"

set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_pane_background_color "#{@thm_surface_0}"

# Catppuccin plugin entrypoint (TPM default location)
run ~/.tmux/plugins/catppuccin/tmux/catppuccin.tmux

# Load TPM (keep this line at the bottom of the file)
run '~/.tmux/plugins/tpm/tpm'
